name: 🤖 Polymarket Forex Bot

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 📦 Install dependencies
        run: |
          pip install -r requirements.txt
          pip install MetaTrader5

      - name: 📂 Restore probability history
        uses: actions/cache@v4
        with:
          path: prob_history.json
          key: prob-history-${{ github.run_id }}
          restore-keys: |
            prob-history-

      - name: 🚀 Run bot
        env:
          MT5_LOGIN:        ${{ secrets.MT5_LOGIN }}
          MT5_PASSWORD:     ${{ secrets.MT5_PASSWORD }}
          MT5_SERVER:       ${{ secrets.MT5_SERVER }}
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python run_once.py

      - name: 💾 Upload logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bot-logs-${{ github.run_number }}
          path: logs/
          retention-days: 7
